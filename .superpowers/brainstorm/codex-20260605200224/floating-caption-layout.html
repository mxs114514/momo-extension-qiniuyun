<h2>一期悬浮字幕交互方案</h2>
<p class="subtitle">目标：插件开启后页面常驻悬浮球；点击展开字幕面板；点击面板右上角 - 收回悬浮球；展开/收起只改变展示形态，不改变翻译状态。</p>

<div class="cards">
  <div class="card" data-choice="recommended" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="height:260px;position:relative;background:#f7f8fa;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb">
        <div style="height:36px;background:#ffffff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 14px;color:#667085;font-size:12px">Video page</div>
        <div style="position:absolute;inset:52px 34px 56px 34px;background:#d9dee8;border-radius:8px"></div>
        <div style="position:absolute;left:50%;bottom:28px;transform:translateX(-50%);width:64%;min-height:58px;background:rgba(17,24,39,.88);color:#fff;border-radius:8px;padding:12px 42px 12px 16px;text-align:center;font-size:16px;line-height:1.45;box-shadow:0 8px 24px rgba(15,23,42,.22)">
          <button style="position:absolute;right:10px;top:8px;width:24px;height:24px;border-radius:6px;border:0;background:rgba(255,255,255,.12);color:#fff;font-size:18px;line-height:20px">-</button>
          这里显示实时中文字幕，自动被新结果修正
        </div>
        <div style="position:absolute;right:24px;bottom:24px;width:46px;height:46px;border-radius:50%;background:#111827;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 8px 20px rgba(15,23,42,.28)">译</div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 推荐：悬浮球常驻，字幕居中底部</h3>
      <p>符合视频字幕习惯。悬浮球作为入口；字幕面板只负责展示，不承载开始/暂停状态切换。</p>
    </div>
  </div>

  <div class="card" data-choice="side" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="height:260px;position:relative;background:#f7f8fa;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb">
        <div style="height:36px;background:#ffffff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 14px;color:#667085;font-size:12px">Video page</div>
        <div style="position:absolute;inset:52px 34px 56px 34px;background:#d9dee8;border-radius:8px"></div>
        <div style="position:absolute;right:24px;bottom:82px;width:310px;min-height:86px;background:rgba(17,24,39,.88);color:#fff;border-radius:8px;padding:14px 42px 14px 16px;font-size:15px;line-height:1.45;box-shadow:0 8px 24px rgba(15,23,42,.22)">
          <button style="position:absolute;right:10px;top:8px;width:24px;height:24px;border-radius:6px;border:0;background:rgba(255,255,255,.12);color:#fff;font-size:18px;line-height:20px">-</button>
          这里显示实时中文字幕，靠右避免遮挡底部字幕区
        </div>
        <div style="position:absolute;right:24px;bottom:24px;width:46px;height:46px;border-radius:50%;background:#111827;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 8px 20px rgba(15,23,42,.28)">译</div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 靠右面板</h3>
      <p>更像工具浮窗，但可能离视频焦点较远，长字幕阅读效率不如底部居中。</p>
    </div>
  </div>
</div>
